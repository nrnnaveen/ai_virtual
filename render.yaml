services:
  - type: web
    name: ai-virtual-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://ai-virtual-frontend.onrender.com
      - key: BACKEND_URL
        value: https://ai-virtual-backend.onrender.com

  - type: web
    name: ai-virtual-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: VITE_WS_URL
        value: wss://ai-virtual-backend.onrender.com/ws
